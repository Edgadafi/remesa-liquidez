  </g><text x="64" y="62" font-family="system-ui" font-size="11" letter-spacing="3" fill="#C9A84C">PROBLEM</text><text x="64" y="112" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#F5F0E8">Staying stuck costs families 7% and</text><text x="64" y="148" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#F5F0E8">hours — every month.</text><text x="64" y="208" font-family="system-ui" font-size="14" font-style="italic" fill="#7AAE8A">Senders to Mexico cannot automate instant, recurring transfers.</text><rect x="64" y="248" width="580" height="44" fill="#1A4A2E" stroke="#2A6A3E" stroke-width="0.5"/><text x="76" y="276" font-family="system-ui" font-size="12" font-weight="600" fill="#F5F0E8">Pain</text><rect x="644" y="248" width="580" height="44" fill="#1A4A2E" stroke="#2A6A3E" stroke-width="0.5"/><text x="656" y="276" font-family="system-ui" font-size="12" font-weight="600" fill="#F5F0E8">Cost</text><rect x="64" y="292" width="580" height="44" fill="#0F2318" stroke="#2A6A3E" stroke-width="0.5"/><text x="76" y="320" font-family="system-ui" font-size="11" font-weight="500" fill="#F5F0E8">TradFi friction</text><rect x="644" y="292" width="580" height="44" fill="#0F2318" stroke="#2A6A3E" stroke-width="0.5"/><text x="656" y="320" font-family="system-ui" font-size="11" font-weight="400" fill="#7AAE8A">Hidden fees up to 7%</text><rect x="64" y="336" width="580" height="44" fill="#0F2318" stroke="#2A6A3E" stroke-width="0.5"/><text x="76" y="364" font-family="system-ui" font-size="11" font-weight="500" fill="#F5F0E8">Slow settlement</text><rect x="644" y="336" width="580" height="44" fill="#0F2318" stroke="#2A6A3E" stroke-width="0.5"/><text x="656" y="364" font-family="system-ui" font-size="11" font-weight="400" fill="#7AAE8A">Hours waiting per transaction</text><rect x="64" y="380" width="580" height="44" fill="#0F2318" stroke="#2A6A3E" stroke-width="0.5"/><text x="76" y="408" font-family="system-ui" font-size="11" font-weight="500" fill="#F5F0E8">No recurrence</text><rect x="644" y="380" width="580" height="44" fill="#0F2318" stroke="#2A6A3E" stroke-width="0.5"/><text x="656" y="408" font-family="system-ui" font-size="11" font-weight="400" fill="#7AAE8A">Manual run every payday</text><rect x="64" y="424" width="580" height="44" fill="#0F2318" stroke="#2A6A3E" stroke-width="0.5"/><text x="76" y="452" font-family="system-ui" font-size="11" font-weight="500" fill="#F5F0E8">Receiver excluded</text><rect x="644" y="424" width="580" height="44" fill="#0F2318" stroke="#2A6A3E" stroke-width="0.5"/><text x="656" y="452" font-family="system-ui" font-size="11" font-weight="400" fill="#7AAE8A">No bank, no app — needs cash</text><text x="1232" y="692" font-family="system-ui" font-size="11" fill="#7AAE8A" text-anchor="end">02 / 10</text>
